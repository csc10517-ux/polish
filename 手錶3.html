<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POLISH_V9_VIEW_OK</title>
<style>
html, body { background: #000; color: #fff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; touch-action: none; }
.container { display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; padding: 10px; box-sizing: border-box; }

/* 頂部換頁 */
.top-nav { width: 90%; height: 50px; display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.nav-hit { width: 30%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #333; }
.mode-title { font-size: 18px; color: #00ccff; font-weight: bold; }

/* 滑桿 */
.slider-container { width: 70%; margin-top: 10px; }
#slider { width: 100%; height: 15px; background: #222; appearance: none; outline: none; border-radius: 10px; }
#slider::-webkit-slider-thumb { appearance: none; width: 30px; height: 30px; background: #888; border-radius: 50%; border: 2px solid #fff; }

/* 數值顯示 */
.control-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
.val-display { font-size: 42px; font-weight: bold; min-width: 110px; text-align: center; }
.neg-val { color: #ff9c6e !important; }
.adj-btn { width: 55px; height: 55px; background: #222; color: #fff; border: 1px solid #444; border-radius: 50%; font-size: 28px; }

/* 計算結果：往上移動，避免被手機或手錶底端切掉 */
.res-area {
margin-top: 25px;
padding: 10px;
background: rgba(255,255,255,0.05);
border-radius: 10px;
width: 80%;
text-align: center;
}
.res-label { font-size: 11px; color: #666; margin-bottom: 5px; }
.res-val { font-size: 32px; color: #ff4d4f; font-weight: bold; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="container">
<div class="top-nav">
<div class="nav-hit" onclick="doChangeP(-1)">◂</div>
<div id="pName" class="mode-title">OFFSET</div>
<div class="nav-hit" onclick="doChangeP(1)">▸</div>
</div>

<div class="slider-container">
<input type="range" id="slider" min="0" max="300" value="175">
</div>

<div class="control-row">
<button class="adj-btn" onclick="doAdj(-1)">-</button>
<div class="val-display" id="vDisp">175</div>
<button class="adj-btn" onclick="doAdj(1)">+</button>
</div>

<div class="res-area">
<div class="res-label">RESULT (X' / Z')</div>
<div class="res-val" id="res">--- / ---</div>
</div>
</div>

<script>
var p = 0, d = { o: 175, x: 0, z: 0 };
var s = document.getElementById('slider'), vDisp = document.getElementById('vDisp');
var pName = document.getElementById('pName'), resDisp = document.getElementById('res');

window.addEventListener('wheel', function(e) {
e.preventDefault();
doAdj((e.deltaY > 0) ? 1 : -1);
}, { passive: false });

s.oninput = function() { doUpdate(parseInt(s.value)); };

function doAdj(n) {
var v = parseInt(s.value) + n;
if(v < s.min) v = s.min; if(v > s.max) v = s.max;
s.value = v; doUpdate(v);
}

function doUpdate(v) {
vDisp.innerText = v;
vDisp.className = (v < 0) ? 'val-display neg-val' : 'val-display';
if(p == 0) d.o = v; else if(p == 1) d.x = v; else d.z = v;

if(d.x != 0 || d.z != 0) {
var L = Math.sqrt(d.x * d.x + d.z * d.z);
var ratio = (L + d.o) / L;
resDisp.innerText = Math.round(d.x * ratio) + " / " + Math.round(d.z * ratio);
} else { resDisp.innerText = "--- / ---"; }
}

function doChangeP(dir) {
p = (p + dir + 3) % 3;
if(p == 0) { pName.innerText = "OFFSET"; s.min = 0; s.max = 300; s.value = d.o; }
else if(p == 1) { pName.innerText = "INPUT_X"; s.min = -500; s.max = 500; s.value = d.x; }
else { pName.innerText = "INPUT_Z"; s.min = -500; s.max = 500; s.value = d.z; }
doUpdate(parseInt(s.value));
}
doChangeP(0);
</script>
</body>
</html>
