<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POLISH_V9_FULL_CALC</title>
<style>
    html, body { background: #000; color: #fff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; touch-action: none; }
    .container { display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; padding: 5px; box-sizing: border-box; justify-content: center; }
    
    /* 數值與微調按鈕 */
    .control-row { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 5px; }
    .adj-btn { width: 50px; height: 50px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid #444; }
    .val-display { font-size: 45px; font-weight: bold; margin: 0 10px; min-width: 100px; text-align: center; color: #fff; }

    /* 滑桿 */
    .slider-container { width: 85%; margin-bottom: 10px; }
    #slider { width: 100%; height: 18px; appearance: none; background: #222; border-radius: 10px; outline: none; }
    #slider::-webkit-slider-thumb { appearance: none; width: 28px; height: 28px; background: #00ccff; border-radius: 50%; }

    /* 三頁切換 (選擇要輸入哪一個) */
    .nav-group { width: 95%; display: flex; align-items: center; justify-content: space-between; background: #111; border-radius: 12px; padding: 5px; margin-bottom: 10px; }
    .nav-btn { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #222; border-radius: 10px; }
    .mode-title { font-size: 15px; color: #00ccff; font-weight: bold; }

    /* 計算結果表格 (參考 6664.jpg) */
    .res-table { width: 90%; background: #1a1a1a; border-radius: 8px; border-collapse: collapse; overflow: hidden; }
    .res-table th { background: #333; font-size: 12px; padding: 4px; color: #aaa; }
    .res-table td { border: 1px solid #333; text-align: center; padding: 8px 0; font-size: 20px; font-weight: bold; }
    .highlight { color: #ff4d4d; } /* 類似 6664.jpg 的紅色結果 */
</style>
</head>
<body>

<div class="container">
    <!-- 1. 當前輸入項數值 -->
    <div class="control-row">
        <div class="adj-btn" id="minus">-</div>
        <div class="val-display" id="val">300</div>
        <div class="adj-btn" id="plus">+</div>
    </div>
    
    <div class="slider-container">
        <input type="range" id="slider" min="0" max="1000" value="300">
    </div>

    <!-- 2. 切換要調整哪一個數值 (Offset / X / Z) -->
    <div class="nav-group">
        <div class="nav-btn" id="prev">&lt;</div>
        <div class="mode-title" id="mode">補正值 (Offset)</div>
        <div class="nav-btn" id="next">&gt;</div>
    </div>

    <!-- 3. 完整計算結果表 (參考 6664.jpg) -->
    <table class="res-table">
        <tr>
            <th>X</th>
            <th>Z</th>
            <th>X1</th>
            <th>Z1</th>
        </tr>
        <tr>
            <td id="td_x">200</td>
            <td id="td_z">100</td>
            <td id="td_x1" class="highlight">468</td>
            <td id="td_z1" class="highlight">234</td>
        </tr>
    </table>
</div>

<script>
    const slider = document.getElementById('slider');
    const valDisplay = document.getElementById('val');
    const modeDisplay = document.getElementById('mode');
    
    // 儲存三個輸入項的數值 (參考 6664.jpg 初始值)
    let data = {
        "補正值 (Offset)": 300,
        "X 座標": 200,
        "Z 座標": 100
    };
    const modes = Object.keys(data);
    let currentIndex = 0;

    function calculate() {
        const offset = data["補正值 (Offset)"];
        const x = data["X 座標"];
        const z = data["Z 座標"];

        // 根據 6664.jpg 的比例 (468/200 ≒ 2.34) 模擬公式
        // 請在此處填入您真正的工業計算公式
        const x1 = Math.round(x * (offset / 128.2)); 
        const z1 = Math.round(z * (offset / 128.2));

        document.getElementById('td_x').innerText = x;
        document.getElementById('td_z').innerText = z;
        document.getElementById('td_x1').innerText = x1;
        document.getElementById('td_z1').innerText = z1;
    }

    function updateUI() {
        const currentKey = modes[currentIndex];
        modeDisplay.innerText = currentKey;
        slider.value = data[currentKey];
        valDisplay.innerText = data[currentKey];
        calculate();
    }

    // 按鈕控制
    document.getElementById('plus').onclick = () => { slider.value++; slider.oninput(); };
    document.getElementById('minus').onclick = () => { slider.value--; slider.oninput(); };
    document.getElementById('next').onclick = () => { currentIndex = (currentIndex + 1) % modes.length; updateUI(); };
    document.getElementById('prev').onclick = () => { currentIndex = (currentIndex - 1 + modes.length) % modes.length; updateUI(); };

    slider.oninput = () => {
        data[modes[currentIndex]] = parseInt(slider.value);
        valDisplay.innerText = slider.value;
        calculate();
    };

    // 錶圈轉盤控制
    window.addEventListener('wheel', (e) => {
        if (e.deltaY < 0) slider.value = parseInt(slider.value) + 1;
        else slider.value = parseInt(slider.value) - 1;
        slider.oninput();
        e.preventDefault();
    }, { passive: false });

    updateUI();
</script>

</body>
</html>
