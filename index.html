<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>POLISH_WATCH_FIXED</title>
<style>
    /* 1. 徹底禁止畫面偏移 */
    html, body { 
        background: #000; color: #fff; margin: 0; padding: 0; 
        width: 100vw; height: 100vh; 
        overflow: hidden; /* 禁止原生滾動，防止偏移 */
        font-family: sans-serif;
        user-select: none;
        touch-action: none; /* 禁用瀏覽器手勢，防止點擊偏移 */
    }

    .container { 
        position: absolute; top: 0; left: 0; 
        width: 100%; height: 100%; 
        display: flex; flex-direction: column; align-items: center; 
        justify-content: center; box-sizing: border-box;
    }
    
    /* 頂部結果 */
    .res-area { position: absolute; top: 18%; width: 80%; display: flex; justify-content: space-around; text-align: center; }
    .res-item b { font-size: 36px; color: #ff4d4f; display: block; line-height: 1; }
    .res-item span { font-size: 11px; color: #888; }

    /* 中央數值 */
    .center-content { text-align: center; width: 70%; z-index: 5; margin-top: 15px; }
    .mode-label { font-size: 13px; color: #ffa940; font-weight: bold; }
    .val-display { font-size: 55px; font-weight: bold; line-height: 1; margin: 5px 0; }
    
    .slider-container { width: 100%; margin-top: 5px; }
    #slider { width: 100%; height: 16px; appearance: none; background: #333; border-radius: 8px; outline: none; }
    #slider::-webkit-slider-thumb { appearance: none; width: 28px; height: 28px; background: #1890ff; border-radius: 50%; border: 2px solid #fff; }

    /* 四角按鈕位置 (根據 6675.jpg 優化) */
    .corner-btn { 
        position: absolute; width: 46px; height: 46px; background: #262626; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        font-size: 20px; border: 1px solid #444; z-index: 10; color: #fff; 
    }
    .corner-btn:active { background: #1890ff; }
    
    #btnPrevMode { top: 32%; left: 14%; }
    #btnNextMode { top: 32%; right: 14%; }
    #btnMinus    { bottom: 18%; left: 20%; }
    #btnPlus     { bottom: 18%; right: 20%; }
</style>
</head>
<body>

<div class="container">
    <div class="res-area">
        <div class="res-item"><span>X1</span><b id="rx">-</b></div>
        <div class="res-item"><span>Z1</span><b id="rz">-</b></div>
    </div>

    <div class="center-content">
        <div class="mode-label" id="curLabel">補正值 (Offset)</div>
        <div class="val-display" id="curVal">175</div>
        <div class="slider-container">
            <input type="range" id="slider" min="0" max="300" value="175">
        </div>
    </div>

    <div class="corner-btn" onclick="changeMode(-1)" style="top: 32%; left: 14%;">◀</div>
    <div class="corner-btn" onclick="changeMode(1)" style="top: 32%; right: 14%;">▶</div>
    <div class="corner-btn" onclick="adjustVal(-1)" style="bottom: 18%; left: 20%;">－</div>
    <div class="corner-btn" onclick="adjustVal(1)" style="bottom: 18%; right: 20%;">＋</div>
</div>

<script>
    const slider = document.getElementById('slider');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');

    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    function run() {
        const o = data.offset;
        const x = data.x;
        const z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x*x + z*z);
            const r = L === 0 ? 1 : (L + o) / L;
            document.getElementById('rx').innerText = Math.round(x * r);
            document.getElementById('rz').innerText = Math.round(z * r);
        } else {
            document.getElementById('rx').innerText = "-";
            document.getElementById('rz').innerText = "-";
        }
    }

    function updateUI() {
        const key = fields[currentIdx];
        curLabel.innerText = labels[currentIdx];
        curVal.innerText = data[key];
        if (key === "offset") { slider.min = 0; slider.max = 300; }
        else { slider.min = -500; slider.max = 500; }
        slider.value = data[key];
        run();
    }

    function changeMode(dir) {
        currentIdx = (currentIdx + dir + fields.length) % fields.length;
        updateUI();
    }

    function adjustVal(delta) {
        const key = fields[currentIdx];
        data[key] += delta;
        if(key === "offset") data[key] = Math.max(0, Math.min(300, data[key]));
        else data[key] = Math.max(-500, Math.min(500, data[key]));
        updateUI();
    }

    slider.oninput = () => {
        data[fields[currentIdx]] = parseInt(slider.value);
        curVal.innerText = slider.value;
        run();
    };

    // 解決「裱框/實體錶圈」連動的核心程式碼
    const handleWheel = (e) => {
        e.preventDefault(); // 阻止頁面偏移/捲動
        const delta = e.wheelDelta || -e.deltaY; // 捕捉多種瀏覽器的轉盤訊號
        if (delta > 0) adjustVal(1);
        else if (delta < 0) adjustVal(-1);
    };

    window.addEventListener('wheel', handleWheel, { passive: false });
    window.addEventListener('mousewheel', handleWheel, { passive: false });

    // 解決「點擊畫面偏移」：禁止縮放與雙擊行為
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    updateUI();
</script>

</body>
</html>
