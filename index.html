<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POLISH_WATCH_V12</title>
<style>
    html, body { background: #000; color: #fff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; touch-action: none; }
    .container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }
    
    /* 頂部結果：位置稍微下移一點點 */
    .res-area { position: absolute; top: 15%; width: 100%; display: flex; justify-content: space-around; text-align: center; pointer-events: none; }
    .res-item b { font-size: 40px; color: #ff4d4f; display: block; line-height: 1; }
    .res-item span { font-size: 12px; color: #888; }

    /* 中央數值 */
    .center-content { text-align: center; width: 80%; z-index: 5; }
    .mode-label { font-size: 14px; color: #ffa940; font-weight: bold; }
    .val-display { font-size: 60px; font-weight: bold; line-height: 1; margin: 5px 0; color: #fff; }
    
    .slider-container { width: 100%; margin-top: 8px; }
    #slider { width: 100%; height: 20px; appearance: none; background: #333; border-radius: 10px; outline: none; }
    #slider::-webkit-slider-thumb { appearance: none; width: 32px; height: 32px; background: #1890ff; border-radius: 50%; border: 2px solid #fff; }

    /* 四角按鈕：往中間進來一點 */
    .corner-btn { position: absolute; width: 52px; height: 52px; background: #262626; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid #444; z-index: 10; color: #fff; touch-action: manipulation; }
    .corner-btn:active { background: #1890ff; }
    
    /* 修正後的按鈕位置 */
    #btnPrevMode { top: 28%; left: 8%; }   /* 左上：分頁◀ */
    #btnNextMode { top: 28%; right: 8%; }  /* 右上：分頁▶ */
    #btnMinus    { bottom: 10%; left: 15%; } /* 左下：微調－ */
    #btnPlus     { bottom: 10%; right: 15%; }/* 右下：微調＋ */
</style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="res-area">
        <div class="res-item"><span>X1</span><b id="rx">-</b></div>
        <div class="res-item"><span>Z1</span><b id="rz">-</b></div>
    </div>

    <div class="center-content">
        <div class="mode-label" id="curLabel">補正值 (Offset)</div>
        <div class="val-display" id="curVal">175</div>
        <div class="slider-container">
            <input type="range" id="slider" min="0" max="300" value="175">
        </div>
    </div>

    <!-- 按鈕內移 -->
    <div class="corner-btn" id="btnPrevMode" onclick="changeMode(-1)">◀</div>
    <div class="corner-btn" id="btnNextMode" onclick="changeMode(1)">▶</div>
    <div class="corner-btn" id="btnMinus" onclick="adjustVal(-1)">－</div>
    <div class="corner-btn" id="btnPlus" onclick="adjustVal(1)">＋</div>
</div>

<script>
    const slider = document.getElementById('slider');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');

    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    function run() {
        const o = data.offset;
        const x = data.x;
        const z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x * x + z * z);
            const r = L === 0 ? 1 : (L + o) / L;
            document.getElementById('rx').innerText = Math.round(x * r);
            document.getElementById('rz').innerText = Math.round(z * r);
        } else {
            document.getElementById('rx').innerText = "-";
            document.getElementById('rz').innerText = "-";
        }
    }

    function updateUI() {
        const key = fields[currentIdx];
        curLabel.innerText = labels[currentIdx];
        curVal.innerText = data[key];
        
        if (key === "offset") { slider.min = 0; slider.max = 300; }
        else { slider.min = -500; slider.max = 500; }
        slider.value = data[key];
        run();
    }

    function changeMode(dir) {
        currentIdx = (currentIdx + dir + fields.length) % fields.length;
        updateUI();
    }

    function adjustVal(delta) {
        const key = fields[currentIdx];
        data[key] += delta;
        if(key === "offset") data[key] = Math.max(0, Math.min(300, data[key]));
        else data[key] = Math.max(-500, Math.min(500, data[key]));
        updateUI();
    }

    slider.oninput = () => {
        data[fields[currentIdx]] = parseInt(slider.value);
        curVal.innerText = slider.value;
        run();
    };

    // 強制捕捉 Galaxy Watch 實體錶圈 (Wheel)
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        // 增加靈敏度判斷
        const delta = e.deltaY;
        const step = Math.abs(delta) > 10 ? (delta > 0 ? -1 : 1) : 0;
        if (step !== 0) adjustVal(step);
    }, { passive: false });

    // 額外監聽：確保在 container 上的轉動也能被捕獲
    document.getElementById('mainContainer').addEventListener('wheel', (e) => {
        e.preventDefault();
    }, { passive: false });

    updateUI();
</script>

</body>
</html>
