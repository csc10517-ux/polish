<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POLISH_V9_PRO_FINAL</title>
<style>
    html, body { background: #000; color: #fff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; touch-action: none; }
    .container { display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; padding: 5px; box-sizing: border-box; justify-content: center; }
    
    .val-display { font-size: 55px; font-weight: bold; color: #fff; margin-bottom: 5px; }

    .slider-container { width: 85%; margin-bottom: 15px; }
    #slider { width: 100%; height: 25px; appearance: none; background: #333; border-radius: 15px; outline: none; }
    #slider::-webkit-slider-thumb { appearance: none; width: 35px; height: 35px; background: #fff; border-radius: 50%; border: 3px solid #00ccff; }

    .nav-group { width: 95%; display: flex; align-items: center; justify-content: space-between; background: #111; border-radius: 15px; padding: 5px; margin-bottom: 15px; }
    .nav-btn { width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 30px; background: #333; border-radius: 10px; color: #fff; border: 1px solid #444; }
    .mode-title { font-size: 18px; color: #00ccff; font-weight: bold; min-width: 100px; text-align: center; }

    .res-area { padding: 15px; background: rgba(0, 204, 255, 0.1); width: 85%; text-align: center; font-size: 22px; border-radius: 12px; border: 1px solid #00ccff; }
</style>
</head>
<body>

<div class="container">
    <div class="val-display" id="val">210</div>
    
    <div class="slider-container">
        <input type="range" id="slider" min="0" max="1000" value="210">
    </div>

    <div class="nav-group">
        <div class="nav-btn" id="prevBtn">&lt;</div>
        <div class="mode-title" id="mode">INPUT_X</div>
        <div class="nav-btn" id="nextBtn">&gt;</div>
    </div>

    <div class="res-area">
        RESULT: <span id="res">0</span>
    </div>
</div>

<script>
    const slider = document.getElementById('slider');
    const valDisplay = document.getElementById('val');
    const modeDisplay = document.getElementById('mode');
    const resDisplay = document.getElementById('res');
    
    const modes = ["INPUT_X", "INPUT_Z", "OFFSET"];
    let currentIndex = 0;

    function updateView() {
        valDisplay.innerText = slider.value;
        modeDisplay.innerText = modes[currentIndex];
        
        // 這裡您可以根據 currentIndex 或 modes[currentIndex] 加入您的計算公式
        let v = parseInt(slider.value);
        if(modes[currentIndex] === "INPUT_X") resDisplay.innerText = (v * 1.0).toFixed(2);
        else if(modes[currentIndex] === "INPUT_Z") resDisplay.innerText = (v * 1.6).toFixed(2);
        else resDisplay.innerText = (v - 100).toFixed(2); // OFFSET 範例公式
    }

    document.getElementById('nextBtn').onclick = () => {
        currentIndex = (currentIndex + 1) % modes.length;
        updateView();
    };

    document.getElementById('prevBtn').onclick = () => {
        currentIndex = (currentIndex - 1 + modes.length) % modes.length;
        updateView();
    };

    slider.oninput = updateView;

    // 錶圈控制
    window.addEventListener('wheel', (e) => {
        let step = 1;
        slider.value = parseInt(slider.value) + (e.deltaY < 0 ? step : -step);
        updateView();
        e.preventDefault();
    }, { passive: false });

    updateView();
</script>

</body>
</html>
