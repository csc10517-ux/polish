<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<!-- 1. 強制禁止縮放，添加 viewport-fit=cover 確保填滿圓形螢幕 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>POLISH_FIX_FINAL</title>
<style>
    /* 2. 物理鎖定層：將 html/body 設為不可滾動的絕對靜態 */
    html, body { 
        background: #000; color: #fff; margin: 0; padding: 0; 
        width: 100%; height: 100%; 
        overflow: hidden !important; 
        position: fixed; /* 讓整個底層變成固定不變 */
        touch-action: none; /* 核心：禁止所有原生手勢(縮放、拖動) */
        user-select: none;
        -webkit-user-select: none;
    }

    /* 3. 滿版容器，確保沒有任何邊界可以被「拖動」 */
    .app-wrapper {
        position: absolute; top: 0; left: 0;
        width: 100vw; height: 100vh;
        overflow: hidden;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    
    .res-area { position: absolute; top: 18%; width: 80%; display: flex; justify-content: space-around; pointer-events: none; }
    .res-item b { font-size: 36px; color: #ff4d4f; display: block; line-height: 1; }
    .res-item span { font-size: 11px; color: #888; }

    .center-content { text-align: center; width: 70%; margin-top: 15px; }
    .mode-label { font-size: 13px; color: #ffa940; font-weight: bold; }
    .val-display { font-size: 55px; font-weight: bold; line-height: 1; margin: 5px 0; }
    
    /* 滑桿優化 */
    .slider-box { width: 100%; margin-top: 5px; }
    input[type=range] { 
        width: 100%; height: 18px; appearance: none; background: #333; border-radius: 9px; 
        touch-action: pan-x !important; /* 只允許水平滑動拉桿 */
    }
    input[type=range]::-webkit-slider-thumb { appearance: none; width: 30px; height: 30px; background: #1890ff; border-radius: 50%; border: 2px solid #fff; }

    /* 按鈕稍微內縮，避開螢幕邊緣觸發系統手勢 */
    .btn { 
        position: absolute; width: 52px; height: 52px; background: #262626; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        font-size: 22px; border: 1px solid #444; color: #fff; z-index: 999;
    }
    .btn:active { background: #1890ff; }
</style>
</head>
<!-- 4. 禁止右鍵與預設觸摸行為 -->
<body oncontextmenu="return false;" ondragstart="return false;">

<div class="app-wrapper">
    <div class="res-area">
        <div class="res-item"><span>X1</span><b id="rx">-</b></div>
        <div class="res-item"><span>Z1</span><b id="rz">-</b></div>
    </div>

    <div class="center-content">
        <div id="curLabel" class="mode-label">補正值 (Offset)</div>
        <div id="curVal" class="val-display">175</div>
        <div class="slider-box">
            <input type="range" id="slider" min="0" max="300" value="175">
        </div>
    </div>

    <div class="btn" style="top: 32%; left: 14%;" id="b_prev">◀</div>
    <div class="btn" style="top: 32%; right: 14%;" id="b_next">▶</div>
    <div class="btn" style="bottom: 18%; left: 20%;" id="b_minus">－</div>
    <div class="btn" style="bottom: 18%; right: 20%;" id="b_plus">＋</div>
</div>

<script>
    // 基本邏輯設定
    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    const rx = document.getElementById('rx');
    const rz = document.getElementById('rz');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');
    const slider = document.getElementById('slider');

    function run() {
        const o = data.offset, x = data.x, z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x*x + z*z);
            const r = (L + o) / L;
            rx.innerText = Math.round(x * r);
            rz.innerText = Math.round(z * r);
        } else {
            rx.innerText = "-"; rz.innerText = "-";
        }
    }

    function updateUI() {
        const key = fields[currentIdx];
        curLabel.innerText = labels[currentIdx];
        curVal.innerText = data[key];
        slider.min = (key === "offset") ? 0 : -500;
        slider.max = (key === "offset") ? 300 : 500;
        slider.value = data[key];
        run();
        // 強制歸位：防止任何點擊導致的位移
        window.scrollTo(0, 0);
    }

    function adjust(delta) {
        data[fields[currentIdx]] += delta;
        data[fields[currentIdx]] = Math.max(slider.min, Math.min(slider.max, data[fields[currentIdx]]));
        updateUI();
    }

    // 5. 徹底解決「一按就偏」：攔截觸摸並禁止冒泡
    const preventAll = (e) => {
        if (e.target.id !== 'slider') { // 除非是拉桿，否則禁止一切預設動作
            e.preventDefault();
        }
        e.stopPropagation();
    };

    // 按鈕綁定
    const bind = (id, fn) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { preventAll(e); fn(); }, {passive: false});
    };

    bind('b_prev', () => { currentIdx = (currentIdx - 1 + 3) % 3; updateUI(); });
    bind('b_next', () => { currentIdx = (currentIdx + 1) % 3; updateUI(); });
    bind('b_minus', () => adjust(-1));
    bind('b_plus', () => adjust(1));

    slider.addEventListener('input', () => {
        data[fields[currentIdx]] = parseInt(slider.value);
        curVal.innerText = slider.value;
        run();
    });

    // 6. 解決錶圈 (Galaxy Watch 實體旋轉)
    // 監聽所有可能的旋轉訊號
    const onRotate = (e) => {
        e.preventDefault();
        const delta = e.wheelDelta || -e.deltaY;
        adjust(delta > 0 ? 1 : -1);
    };
    window.addEventListener('mousewheel', onRotate, {passive: false});
    window.addEventListener('wheel', onRotate, {passive: false});
    // 三星專用底層訊號
    document.addEventListener('rotarydetent', (e) => {
        adjust(e.detail.direction === 'CW' ? 1 : -1);
    });

    // 雙保險：防止任何形式的捲動
    window.addEventListener('scroll', () => window.scrollTo(0, 0));
    document.addEventListener('touchmove', (e) => { if (e.touches.length > 1) e.preventDefault(); }, {passive: false});

    updateUI();
</script>
</body>
</html>
