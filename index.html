<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FINAL_CANVAS_LOCK</title>
    <style>
        html, body { 
            background: #000; margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden !important; position: fixed; touch-action: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        /* 唯一的 HTML 元素是隱形的，用來強制抓取錶圈捲動 */
        #bezel-fix {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: scroll; z-index: 100; opacity: 0;
        }
        #scroller { height: 10000px; }
    </style>
</head>
<body>

<div id="bezel-fix"><div id="scroller"></div></div>
<canvas id="app"></canvas>

<script>
    const canvas = document.getElementById('app');
    const ctx = canvas.getContext('2d');
    const bezel = document.getElementById('bezel-fix');
    
    let w, h;
    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    let currentIdx = 0;

    function resize() {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        draw();
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);

        // 計算結果
        const { offset: o, x, z } = data;
        let rx = "-", rz = "-";
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x*x + z*z);
            const r = (L + o) / L;
            rx = Math.round(x * r);
            rz = Math.round(z * r);
        }

        // 繪製結果 (頂部)
        ctx.textAlign = 'center';
        ctx.fillStyle = '#888'; ctx.font = '12px sans-serif';
        ctx.fillText('X1', w*0.3, h*0.2); ctx.fillText('Z1', w*0.7, h*0.2);
        ctx.fillStyle = '#ff4d4f'; ctx.font = 'bold 36px sans-serif';
        ctx.fillText(rx, w*0.3, h*0.32); ctx.fillText(rz, w*0.7, h*0.32);

        // 繪製中央數值
        ctx.fillStyle = '#ffa940'; ctx.font = 'bold 14px sans-serif';
        ctx.fillText(fields[currentIdx].toUpperCase(), w*0.5, h*0.48);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 55px sans-serif';
        ctx.fillText(data[fields[currentIdx]], w*0.5, h*0.65);

        // 繪製虛擬拉桿
        const min = currentIdx === 0 ? 0 : -500;
        const max = currentIdx === 0 ? 300 : 500;
        const percent = (data[fields[currentIdx]] - min) / (max - min);
        ctx.fillStyle = '#333'; ctx.roundRect(w*0.15, h*0.72, w*0.7, 10, 5); ctx.fill();
        ctx.fillStyle = '#1890ff';
        ctx.beginPath(); ctx.arc(w*0.15 + (w*0.7 * percent), h*0.72 + 5, 15, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

        // 繪製四角按鈕
        drawBtn(w*0.15, h*0.45, '◀'); // Prev
        drawBtn(w*0.85, h*0.45, '▶'); // Next
        drawBtn(w*0.25, h*0.85, '－'); // Minus
        drawBtn(w*0.75, h*0.85, '＋'); // Plus
    }

    function drawBtn(x, y, text) {
        ctx.fillStyle = '#262626'; ctx.strokeStyle = '#444';
        ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '24px sans-serif';
        ctx.fillText(text, x, y + 8);
    }

    function adjust(delta) {
        const key = fields[currentIdx];
        const min = key === "offset" ? 0 : -500;
        const max = key === "offset" ? 300 : 500;
        data[key] = Math.max(min, Math.min(max, data[key] + delta));
        draw();
    }

    // 處理觸碰：點擊畫布座標
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const tx = t.clientX, ty = t.clientY;

        if (ty > h*0.35 && ty < h*0.55) {
            if (tx < w*0.3) currentIdx = (currentIdx + 2) % 3;
            if (tx > w*0.7) currentIdx = (currentIdx + 1) % 3;
        } else if (ty > h*0.75) {
            if (tx < w*0.4) adjust(-1);
            if (tx > w*0.6) adjust(1);
        } else if (ty > h*0.65 && ty < h*0.8) {
            // 拉桿簡易模擬
            const min = currentIdx === 0 ? 0 : -500;
            const max = currentIdx === 0 ? 300 : 500;
            let p = (tx - w*0.15) / (w*0.7);
            data[fields[currentIdx]] = Math.round(min + (max-min) * Math.max(0, Math.min(1, p)));
        }
        draw();
    }, {passive: false});

    // 錶圈連動：監控隱形層的捲動
    let lastS = 5000;
    bezel.scrollTop = 5000;
    bezel.addEventListener('scroll', () => {
        let diff = bezel.scrollTop - lastS;
        if (Math.abs(diff) > 2) {
            adjust(diff > 0 ? -1 : 1);
            lastS = bezel.scrollTop;
            if (lastS < 2000 || lastS > 8000) { bezel.scrollTop = 5000; lastS = 5000; }
        }
    });

    window.addEventListener('resize', resize);
    window.onload = resize;
</script>
</body>
</html>
