<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>POLISH_PRO_FIX</title>
<style>
    /* 1. 徹底鎖死視窗防止偏移 */
    html, body { 
        background: #000; color: #fff; margin: 0; padding: 0; 
        width: 100%; height: 100%; overflow: hidden !important; 
        position: fixed; touch-action: none; -webkit-user-select: none;
    }

    .app-container {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    
    /* 2. 結果顯示區：避開頂部裁切 */
    .res-group { position: absolute; top: 18%; width: 80%; display: flex; justify-content: space-around; pointer-events: none; }
    .res-item b { font-size: 34px; color: #ff4d4f; display: block; line-height: 1.2; }
    .res-item span { font-size: 11px; color: #888; }

    /* 3. 中央數值與拉桿：確保在中心不觸發手勢 */
    .center-panel { text-align: center; width: 75%; z-index: 10; margin-top: 15px; }
    .mode-title { font-size: 13px; color: #ffa940; font-weight: bold; }
    .val-text { font-size: 52px; font-weight: bold; margin: 5px 0; color: #fff; }
    
    .slider-container { width: 100%; padding: 10px 0; touch-action: pan-x !important; }
    input[type=range] { 
        width: 100%; height: 20px; appearance: none; background: #333; border-radius: 10px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb { 
        appearance: none; width: 34px; height: 34px; background: #1890ff; border-radius: 50%; border: 2px solid #fff; 
    }

    /* 4. 四角按鈕：稍微放大並內縮 */
    .btn { 
        position: absolute; width: 50px; height: 50px; background: #222; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        font-size: 20px; border: 1px solid #444; color: #fff; z-index: 20;
    }
    .btn:active { background: #1890ff; }
</style>
</head>
<body oncontextmenu="return false;">

<div class="app-container">
    <div class="res-group">
        <div class="res-item"><span>X1</span><b id="rx">-</b></div>
        <div class="res-item"><span>Z1</span><b id="rz">-</b></div>
    </div>

    <div class="center-panel">
        <div id="curLabel" class="mode-title">補正值 (Offset)</div>
        <div id="curVal" class="val-text">175</div>
        <div class="slider-container">
            <input type="range" id="slider" min="0" max="300" value="175">
        </div>
    </div>

    <div class="btn" style="top: 32%; left: 14%;" id="btn_pM">◀</div>
    <div class="btn" style="top: 32%; right: 14%;" id="btn_nM">▶</div>
    <div class="btn" style="bottom: 18%; left: 20%;" id="btn_mS">－</div>
    <div class="btn" style="bottom: 18%; right: 20%;" id="btn_pS">＋</div>
</div>

<script>
    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    const slider = document.getElementById('slider');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');

    function calculate() {
        const o = data.offset, x = data.x, z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x*x + z*z);
            const r = (L + o) / L;
            document.getElementById('rx').innerText = Math.round(x * r);
            document.getElementById('rz').innerText = Math.round(z * r);
        } else {
            document.getElementById('rx').innerText = "-";
            document.getElementById('rz').innerText = "-";
        }
    }

    function syncUI() {
        const key = fields[currentIdx];
        curLabel.innerText = labels[currentIdx];
        curVal.innerText = data[key];
        slider.min = (key === "offset") ? 0 : -500;
        slider.max = (key === "offset") ? 300 : 500;
        slider.value = data[key];
        calculate();
        window.scrollTo(0, 0); // 強制重置視窗位置
    }

    function addVal(n) {
        const key = fields[currentIdx];
        data[key] += n;
        data[key] = Math.max(slider.min, Math.min(slider.max, data[key]));
        syncUI();
    }

    // 事件監聽：使用 touchstart 並禁止預設行為來防止偏移
    const setupBtn = (id, fn) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            e.preventDefault();
            fn();
        }, {passive: false});
    };

    setupBtn('btn_pM', () => { currentIdx = (currentIdx - 1 + 3) % 3; syncUI(); });
    setupBtn('btn_nM', () => { currentIdx = (currentIdx + 1) % 3; syncUI(); });
    setupBtn('btn_mS', () => addVal(-1));
    setupBtn('btn_pS', () => addVal(1));

    slider.addEventListener('input', () => {
        data[fields[currentIdx]] = parseInt(slider.value);
        curVal.innerText = slider.value;
        calculate();
    });

    // 實體錶圈 (Bezel) 連動解決方案：
    // 監聽 mousewheel (三星常用) 與標準 wheel
    const bezelHandler = (e) => {
        e.preventDefault();
        const delta = e.wheelDelta || -e.deltaY;
        addVal(delta > 0 ? 1 : -1);
    };
    window.onmousewheel = bezelHandler;
    window.addEventListener('wheel', bezelHandler, {passive: false});

    // 防止手指按住時的偏移
    document.addEventListener('touchstart', (e) => {
        if (e.target.id !== 'slider') e.preventDefault();
    }, {passive: false});
    
    document.addEventListener('touchmove', (e) => {
        if (e.target.id !== 'slider') e.preventDefault();
    }, {passive: false});

    syncUI();
</script>
</body>
</html>
