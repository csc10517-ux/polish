<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>POLISH_FIX_V15</title>
<style>
    /* 徹底鎖死所有可能的位移與手勢 */
    * { touch-action: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { 
        background: #000; color: #fff; margin: 0; padding: 0; 
        width: 100vw; height: 100vh; overflow: hidden; position: fixed;
    }
    .container {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    /* 結果顯示 */
    .res-area { position: absolute; top: 18%; width: 80%; display: flex; justify-content: space-around; pointer-events: none; }
    .res-item b { font-size: 36px; color: #ff4d4f; display: block; line-height: 1; }
    .res-item span { font-size: 11px; color: #888; }
    /* 中央數值 */
    .center-content { text-align: center; width: 70%; margin-top: 15px; pointer-events: none; }
    .mode-label { font-size: 13px; color: #ffa940; font-weight: bold; }
    .val-display { font-size: 55px; font-weight: bold; line-height: 1; margin: 5px 0; }
    /* 自訂滑桿外觀 */
    .slider-wrap { width: 100%; margin-top: 5px; pointer-events: auto; }
    input[type=range] { width: 100%; height: 16px; appearance: none; background: #333; border-radius: 8px; }
    input[type=range]::-webkit-slider-thumb { appearance: none; width: 30px; height: 30px; background: #1890ff; border-radius: 50%; border: 2px solid #fff; }
    /* 按鈕定位 */
    .btn { 
        position: absolute; width: 48px; height: 48px; background: #262626; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        font-size: 20px; border: 1px solid #444; color: #fff; z-index: 100;
    }
    .btn:active { background: #1890ff; }
</style>
</head>
<body oncontextmenu="return false;">

<div class="container" id="lockView">
    <div class="res-area">
        <div class="res-item"><span>X1</span><b id="rx">-</b></div>
        <div class="res-item"><span>Z1</span><b id="rz">-</b></div>
    </div>

    <div class="center-content">
        <div class="mode-label" id="curLabel">補正值 (Offset)</div>
        <div class="val-display" id="curVal">175</div>
        <div class="slider-wrap">
            <input type="range" id="slider" min="0" max="300" value="175">
        </div>
    </div>

    <div class="btn" style="top: 32%; left: 14%;" id="pM">◀</div>
    <div class="btn" style="top: 32%; right: 14%;" id="nM">▶</div>
    <div class="btn" style="bottom: 18%; left: 20%;" id="mS">－</div>
    <div class="btn" style="bottom: 18%; right: 20%;" id="pS">＋</div>
</div>

<script>
    const slider = document.getElementById('slider');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');

    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    function run() {
        const o = data.offset, x = data.x, z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x*x + z*z);
            const r = (L + o) / L;
            document.getElementById('rx').innerText = Math.round(x * r);
            document.getElementById('rz').innerText = Math.round(z * r);
        } else {
            document.getElementById('rx').innerText = "-";
            document.getElementById('rz').innerText = "-";
        }
    }

    function updateUI() {
        const key = fields[currentIdx];
        curLabel.innerText = labels[currentIdx];
        curVal.innerText = data[key];
        slider.min = (key === "offset") ? 0 : -500;
        slider.max = (key === "offset") ? 300 : 500;
        slider.value = data[key];
        run();
    }

    function adjustVal(delta) {
        const key = fields[currentIdx];
        data[key] += delta;
        data[key] = Math.max(slider.min, Math.min(slider.max, data[key]));
        updateUI();
    }

    // 按鈕事件掛載 (避免行內 onclick 觸發預設行為)
    document.getElementById('pM').ontouchstart = (e) => { e.preventDefault(); currentIdx = (currentIdx - 1 + 3) % 3; updateUI(); };
    document.getElementById('nM').ontouchstart = (e) => { e.preventDefault(); currentIdx = (currentIdx + 1) % 3; updateUI(); };
    document.getElementById('mS').ontouchstart = (e) => { e.preventDefault(); adjustVal(-1); };
    document.getElementById('pS').ontouchstart = (e) => { e.preventDefault(); adjustVal(1); };
    slider.oninput = () => { data[fields[currentIdx]] = parseInt(slider.value); curVal.innerText = slider.value; run(); };

    // --- 實體錶圈連動核心方案 ---
    // 方案 A: 標準輪詢
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        adjustVal(e.deltaY > 0 ? -1 : 1);
    }, { passive: false });

    // 方案 B: 針對三星舊內核的 Rotary 事件 (Tizen/WearOS 相容)
    document.addEventListener('rotarydetent', (e) => {
        adjustVal(e.detail.direction === 'CW' ? 1 : -1);
    }, false);

    // 徹底鎖死視窗防止偏移
    document.addEventListener('touchmove', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    window.scrollTo(0,0);

    updateUI();
</script>
</body>
</html>
