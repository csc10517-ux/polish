<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>POLISH_FIX_V17</title>
<style>
    /* 核心鎖定：overscroll-behavior 是解決「手指按住偏掉」的特效藥 */
    html, body { 
        background: #000; color: #fff; margin: 0; padding: 0; 
        width: 100%; height: 100%; 
        overflow: hidden !important; 
        position: fixed; 
        touch-action: none;
        overscroll-behavior: none; /* 防止邊緣拉動偏移 */
        -webkit-user-select: none;
    }

    .container { 
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    
    /* 結果顯示：維持大字體 */
    .res-area { position: absolute; top: 18%; width: 80%; display: flex; justify-content: space-around; pointer-events: none; }
    .res-item b { font-size: 38px; color: #ff4d4f; display: block; line-height: 1; }
    .res-item span { font-size: 11px; color: #888; }

    /* 中央數值與滑桿 */
    .center-content { text-align: center; width: 75%; z-index: 10; margin-top: 15px; }
    .mode-label { font-size: 14px; color: #ffa940; font-weight: bold; }
    .val-display { font-size: 58px; font-weight: bold; line-height: 1; margin: 5px 0; color: #fff; }
    
    .slider-box { width: 100%; padding: 10px 0; }
    input[type=range] { 
        width: 100%; height: 22px; appearance: none; background: #333; border-radius: 11px; outline: none;
        touch-action: pan-x !important; /* 強制僅允許水平操作拉桿 */
    }
    input[type=range]::-webkit-slider-thumb { 
        appearance: none; width: 38px; height: 38px; background: #1890ff; border-radius: 50%; border: 3px solid #fff; 
    }

    /* 四角按鈕：內縮位置確保不被切到 */
    .btn { 
        position: absolute; width: 52px; height: 52px; background: #262626; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        font-size: 22px; border: 1px solid #444; color: #fff; z-index: 20;
    }
    .btn:active { background: #1890ff; }
</style>
</head>
<body oncontextmenu="return false;">

<div class="container" id="mainLayer">
    <div class="res-area">
        <div class="res-item"><span>X1</span><b id="rx">-</b></div>
        <div class="res-item"><span>Z1</span><b id="rz">-</b></div>
    </div>

    <div class="center-content">
        <div id="curLabel" class="mode-label">補正值 (Offset)</div>
        <div id="curVal" class="val-display">175</div>
        <div class="slider-box">
            <input type="range" id="slider" min="0" max="300" value="175">
        </div>
    </div>

    <div class="btn" style="top: 32%; left: 14%;" id="b_pM">◀</div>
    <div class="btn" style="top: 32%; right: 14%;" id="b_nM">▶</div>
    <div class="btn" style="bottom: 18%; left: 20%;" id="b_mS">－</div>
    <div class="btn" style="bottom: 18%; right: 20%;" id="b_pS">＋</div>
</div>

<script>
    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    const slider = document.getElementById('slider');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');

    function run() {
        const o = data.offset, x = data.x, z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x*x+z*z);
            const r = (L+o)/L;
            document.getElementById('rx').innerText = Math.round(x*r);
            document.getElementById('rz').innerText = Math.round(z*r);
        } else {
            document.getElementById('rx').innerText = "-";
            document.getElementById('rz').innerText = "-";
        }
    }

    function syncUI() {
        const key = fields[currentIdx];
        curLabel.innerText = labels[currentIdx];
        curVal.innerText = data[key];
        slider.min = (key === "offset") ? 0 : -500;
        slider.max = (key === "offset") ? 300 : 500;
        slider.value = data[key];
        run();
        window.scrollTo(0, 0); 
    }

    function adjust(n) {
        const key = fields[currentIdx];
        data[key] = Math.max(slider.min, Math.min(slider.max, data[key] + n));
        syncUI();
    }

    // 事件攔截：防止手指按住導致視窗偏移
    const bind = (id, fn) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            e.preventDefault(); // 阻斷系統原生動作
            fn();
        }, {passive: false});
    };

    bind('b_pM', () => { currentIdx = (currentIdx + 2) % 3; syncUI(); });
    bind('b_nM', () => { currentIdx = (currentIdx + 1) % 3; syncUI(); });
    bind('b_mS', () => adjust(-1));
    bind('b_pS', () => adjust(1));

    slider.addEventListener('input', () => {
        data[fields[currentIdx]] = parseInt(slider.value);
        curVal.innerText = slider.value;
        run();
    });

    // 實體裱框 (Bezel) 連動 - 終極嘗試方案
    const onBezel = (e) => {
        e.preventDefault();
        const delta = e.deltaY || e.wheelDelta || (e.detail ? e.detail * -40 : 0);
        adjust(delta > 0 ? -1 : 1);
    };

    window.addEventListener('wheel', onBezel, {passive: false});
    window.addEventListener('mousewheel', onBezel, {passive: false});
    document.addEventListener('DOMMouseScroll', onBezel, {passive: false});
    // 三星手錶專用事件
    document.addEventListener('rotarydetent', (e) => {
        adjust(e.detail.direction === 'CW' ? 1 : -1);
    });

    // 鎖死背景
    document.addEventListener('touchmove', (e) => {
        if (e.target.id !== 'slider') e.preventDefault();
    }, {passive: false});

    syncUI();
</script>
</body>
</html>
