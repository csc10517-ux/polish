<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POLISH_V9_VIEW_OK</title>
<style>
    html, body { background: #000; color: #fff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; touch-action: none; }
    .container { display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; padding: 10px; box-sizing: border-box; }
    
    /* 導航區塊放大並移至下方 */
    .top-nav { width: 100%; height: 80px; display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
    .nav-btn { width: 40%; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 32px; background: #222; border-radius: 10px; color: #fff; }
    .mode-title { font-size: 24px; color: #00ccff; font-weight: bold; }

    /* 滑桿區域 */
    .slider-container { width: 90%; margin-top: 20px; }
    #slider { width: 100%; height: 30px; appearance: none; background: #222; border-radius: 15px; outline: none; }
    #slider::-webkit-slider-thumb { appearance: none; width: 40px; height: 40px; background: #fff; border-radius: 50%; }

    /* 數值顯示 */
    .control-row { display: flex; align-items: center; justify-content: center; margin-top: 20px; }
    .val-display { font-size: 50px; font-weight: bold; margin: 0 20px; }

    /* 結果區塊 */
    .res-area { margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.1); width: 90%; text-align: center; font-size: 28px; border-radius: 10px; }
</style>
</head>
<body>

<div class="container">
    <!-- 數值顯示 -->
    <div class="control-row">
        <div class="val-display" id="val">210</div>
    </div>
    
    <!-- 滑桿 -->
    <div class="slider-container">
        <input type="range" id="slider" min="0" max="500" value="210">
    </div>

    <!-- 導航區移至下方 -->
    <div class="top-nav">
        <div class="nav-btn" onclick="alert('切換X')">&lt;</div>
        <div class="mode-title" id="mode">INPUT_Z</div>
        <div class="nav-btn" onclick="alert('切換Z')">&gt;</div>
    </div>

    <div class="res-area">RESULT (X/Z): <span id="res">0 / 337</span></div>
</div>

<script>
    const slider = document.getElementById('slider');
    const valDisplay = document.getElementById('val');

    // 更新數值邏輯
    slider.addEventListener('input', () => {
        valDisplay.innerText = slider.value;
        // 這裡可以加入您的計算邏輯
    });

    // 監聽轉盤（捲動）事件
    window.addEventListener('wheel', (event) => {
        let step = 1;
        // 根據轉盤方向調整
        if (event.deltaY < 0) {
            slider.value = parseInt(slider.value) + step;
        } else {
            slider.value = parseInt(slider.value) - step;
        }
        slider.dispatchEvent(new Event('input'));
        event.preventDefault();
    }, { passive: false });
</script>

</body>
</html>
