<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POLISH_V9_FINAL_FIX</title>
<style>
    html, body { background: #000; color: #fff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; touch-action: none; }
    .container { display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; padding: 5px; box-sizing: border-box; justify-content: center; }
    
    /* 數值與微調按鈕區 */
    .control-row { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 5px; }
    .adj-btn { width: 55px; height: 55px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 1px solid #444; }
    .val-display { font-size: 50px; font-weight: bold; margin: 0 15px; min-width: 100px; text-align: center; }

    /* 滑桿 */
    .slider-container { width: 85%; margin-bottom: 10px; }
    #slider { width: 100%; height: 20px; appearance: none; background: #222; border-radius: 10px; outline: none; }
    #slider::-webkit-slider-thumb { appearance: none; width: 30px; height: 30px; background: #00ccff; border-radius: 50%; }

    /* 三頁選單區 */
    .nav-group { width: 95%; display: flex; align-items: center; justify-content: space-between; background: #111; border-radius: 15px; padding: 5px; margin-bottom: 10px; }
    .nav-btn { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #222; border-radius: 10px; }
    .mode-title { font-size: 16px; color: #00ccff; font-weight: bold; }

    /* 結果區 */
    .res-area { padding: 12px; background: rgba(0, 204, 255, 0.1); width: 85%; text-align: center; font-size: 22px; border-radius: 10px; border: 1px solid #00ccff; }
</style>
</head>
<body>

<div class="container">
    <!-- 1. 數值與微調按鈕 -->
    <div class="control-row">
        <div class="adj-btn" id="minus">-</div>
        <div class="val-display" id="val">412</div>
        <div class="adj-btn" id="plus">+</div>
    </div>
    
    <!-- 2. 滑桿 -->
    <div class="slider-container">
        <input type="range" id="slider" min="0" max="1000" value="412">
    </div>

    <!-- 3. 三頁選單 (X / Z / OFFSET) -->
    <div class="nav-group">
        <div class="nav-btn" id="prev">&lt;</div>
        <div class="mode-title" id="mode">INPUT_Z</div>
        <div class="nav-btn" id="next">&gt;</div>
    </div>

    <!-- 4. 結果區 -->
    <div class="res-area" id="res">RESULT: 659.20</div>
</div>

<script>
    const slider = document.getElementById('slider');
    const valDisplay = document.getElementById('val');
    const modeDisplay = document.getElementById('mode');
    const resDisplay = document.getElementById('res');
    
    const modes = ["INPUT_X", "INPUT_Z", "OFFSET"];
    let currentIndex = 1; // 預設為圖片中的 INPUT_Z

    function update() {
        const v = parseInt(slider.value);
        valDisplay.innerText = v;
        modeDisplay.innerText = modes[currentIndex];
        
        // 模擬您的公式 (請依需求修改)
        if(modes[currentIndex] === "INPUT_X") resDisplay.innerText = `RESULT: ${(v * 1.0).toFixed(2)}`;
        else if(modes[currentIndex] === "INPUT_Z") resDisplay.innerText = `RESULT: ${(v * 1.6).toFixed(2)}`;
        else resDisplay.innerText = `RESULT: ${(v - 100).toFixed(2)}`;
    }

    // 微調按鈕邏輯
    document.getElementById('plus').onclick = () => { slider.value = parseInt(slider.value) + 1; update(); };
    document.getElementById('minus').onclick = () => { slider.value = parseInt(slider.value) - 1; update(); };

    // 三頁切換邏輯
    document.getElementById('next').onclick = () => { currentIndex = (currentIndex + 1) % modes.length; update(); };
    document.getElementById('prev').onclick = () => { currentIndex = (currentIndex - 1 + modes.length) % modes.length; update(); };

    slider.oninput = update;

    // 解決錶圈轉盤 (Wheel) 控制問題
    window.addEventListener('wheel', (e) => {
        // 轉盤旋轉時直接改變滑桿數值
        const step = 1; 
        if (e.deltaY < 0) {
            slider.value = parseInt(slider.value) + step;
        } else {
            slider.value = parseInt(slider.value) - step;
        }
        update();
        e.preventDefault(); // 阻止網頁捲動，強制控制數值
    }, { passive: false });

    update();
</script>

</body>
</html>
