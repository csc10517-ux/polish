<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>POLISH_SVG_FINAL</title>
<style>
    /* 強制鎖定視窗，禁止任何方向的溢出 */
    html, body { 
        background: #000; color: #fff; margin: 0; padding: 0; 
        width: 100%; height: 100%; overflow: hidden !important; 
        position: fixed; touch-action: none; user-select: none;
    }

    /* 隱藏捲軸但保持可捲動性以誘騙錶圈訊號 */
    #bezel-catcher {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        overflow-y: scroll; z-index: 1;
    }
    #bezel-content { height: 10000px; width: 1px; }

    /* 主要介面使用 SVG 確保不會被系統手勢偏移 */
    svg {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 10; pointer-events: none;
    }
    .touch-layer { pointer-events: auto; fill: transparent; }
    .btn-bg { fill: #262626; stroke: #444; }
    .btn-bg:active { fill: #1890ff; }
    text { font-family: sans-serif; user-select: none; pointer-events: none; }
</style>
</head>
<body>

<div id="bezel-catcher">
    <div id="bezel-content"></div>
</div>

<svg id="app" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
    <text x="100" y="80" font-size="12" fill="#888" text-anchor="middle">X1</text>
    <text id="rx" x="100" y="115" font-size="34" fill="#ff4d4f" font-weight="bold" text-anchor="middle">-</text>
    
    <text x="260" y="80" font-size="12" fill="#888" text-anchor="middle">Z1</text>
    <text id="rz" x="260" y="115" font-size="34" fill="#ff4d4f" font-weight="bold" text-anchor="middle">-</text>

    <text id="curLabel" x="180" y="160" font-size="14" fill="#ffa940" font-weight="bold" text-anchor="middle">補正值 (Offset)</text>
    <text id="curVal" x="180" y="215" font-size="58" fill="#fff" font-weight="bold" text-anchor="middle">175</text>

    <g class="touch-layer" ontouchstart="changeIdx(-1)">
        <circle cx="65" cy="160" r="30" class="btn-bg" />
        <text x="65" y="167" font-size="24" fill="#fff" text-anchor="middle">◀</text>
    </g>
    <g class="touch-layer" ontouchstart="changeIdx(1)">
        <circle cx="295" cy="160" r="30" class="btn-bg" />
        <text x="295" y="167" font-size="24" fill="#fff" text-anchor="middle">▶</text>
    </g>
    <g class="touch-layer" ontouchstart="adjust(-1)">
        <circle cx="90" cy="285" r="32" class="btn-bg" />
        <text x="90" y="293" font-size="28" fill="#fff" text-anchor="middle">－</text>
    </g>
    <g class="touch-layer" ontouchstart="adjust(1)">
        <circle cx="270" cy="285" r="32" class="btn-bg" />
        <text x="270" y="293" font-size="28" fill="#fff" text-anchor="middle">＋</text>
    </g>
</svg>

<script>
    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    const rx = document.getElementById('rx');
    const rz = document.getElementById('rz');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');
    const catcher = document.getElementById('bezel-catcher');

    function update() {
        const o = data.offset, x = data.x, z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x*x + z*z);
            const r = (L + o) / L;
            rx.textContent = Math.round(x * r);
            rz.textContent = Math.round(z * r);
        } else {
            rx.textContent = "-"; rz.textContent = "-";
        }
        curLabel.textContent = labels[currentIdx];
        curVal.textContent = data[fields[currentIdx]];
        // 每次操作強行將捲軸歸位，防止偏移
        window.scrollTo(0, 0);
    }

    function changeIdx(dir) {
        currentIdx = (currentIdx + dir + 3) % 3;
        update();
    }

    function adjust(delta) {
        const key = fields[currentIdx];
        data[key] += delta;
        if(key === "offset") data[key] = Math.max(0, Math.min(300, data[key]));
        else data[key] = Math.max(-500, Math.min(500, data[key]));
        update();
    }

    // --- 改進版錶圈監聽 ---
    let lastScroll = 5000;
    catcher.scrollTop = 5000;

    function pollBezel() {
        const currentScroll = catcher.scrollTop;
        if (currentScroll !== lastScroll) {
            const diff = currentScroll - lastScroll;
            // 轉動幅度判定
            if (Math.abs(diff) > 2) {
                adjust(diff > 0 ? -1 : 1);
                // 重置位置，保持無限捲動空間
                if (currentScroll < 2000 || currentScroll > 8000) {
                    catcher.scrollTop = 5000;
                    lastScroll = 5000;
                } else {
                    lastScroll = currentScroll;
                }
            }
        }
        requestAnimationFrame(pollBezel);
    }
    requestAnimationFrame(pollBezel);

    // 針對 6677.mp4 看到的「手指按住即偏」問題，阻斷一切預設行為
    document.addEventListener('touchstart', (e) => e.preventDefault(), {passive: false});
    document.addEventListener('touchmove', (e) => e.preventDefault(), {passive: false});
    
    update();
</script>
</body>
</html>
