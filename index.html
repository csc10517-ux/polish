<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POLISH_WATCH_V11</title>
<style>
    html, body { background: #000; color: #fff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; touch-action: none; }
    .container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }
    
    /* 頂部巨大化結果 */
    .res-area { position: absolute; top: 12%; width: 100%; display: flex; justify-content: space-around; text-align: center; }
    .res-item b { font-size: 42px; color: #ff4d4f; display: block; line-height: 1; }
    .res-item span { font-size: 12px; color: #888; }

    /* 中央數值與拉桿 */
    .center-content { text-align: center; width: 85%; z-index: 5; }
    .mode-label { font-size: 16px; color: #ffa940; font-weight: bold; margin-bottom: 5px; }
    .val-display { font-size: 65px; font-weight: bold; line-height: 1; margin: 5px 0; color: #fff; }
    
    .slider-container { width: 100%; margin-top: 10px; }
    #slider { width: 100%; height: 22px; appearance: none; background: #333; border-radius: 11px; outline: none; }
    #slider::-webkit-slider-thumb { appearance: none; width: 38px; height: 38px; background: #1890ff; border-radius: 50%; border: 3px solid #fff; }

    /* 四角圓圈按鈕 (參考 6672.jpg) */
    .corner-btn { position: absolute; width: 55px; height: 55px; background: #262626; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #444; z-index: 10; color: #fff; }
    .corner-btn:active { background: #1890ff; }
    
    /* 位置分佈 */
    #btnPrevMode { top: 25%; left: 2%; }  /* 左上: 上一頁 */
    #btnNextMode { top: 25%; right: 2%; } /* 右上: 下一頁 */
    #btnMinus    { bottom: 5%; left: 10%; } /* 左下: 減 */
    #btnPlus     { bottom: 5%; right: 10%; }/* 右下: 加 */
</style>
</head>
<body>

<div class="container">
    <!-- 結果區 -->
    <div class="res-area">
        <div class="res-item"><span>X1</span><b id="rx">-</b></div>
        <div class="res-item"><span>Z1</span><b id="rz">-</b></div>
    </div>

    <!-- 中央輸入區 -->
    <div class="center-content">
        <div class="mode-label" id="curLabel">補正值 (Offset)</div>
        <div class="val-display" id="curVal">175</div>
        <div class="slider-container">
            <input type="range" id="slider" min="0" max="300" value="175">
        </div>
    </div>

    <!-- 四角按鈕 -->
    <div class="corner-btn" id="btnPrevMode" onclick="changeMode(-1)">◀</div>
    <div class="corner-btn" id="btnNextMode" onclick="changeMode(1)">▶</div>
    <div class="corner-btn" id="btnMinus" onclick="adjustVal(-1)">－</div>
    <div class="corner-btn" id="btnPlus" onclick="adjustVal(1)">＋</div>
</div>

<script>
    const slider = document.getElementById('slider');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');

    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    function run() {
        const o = data.offset;
        const x = data.x;
        const z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x * x + z * z);
            const r = L === 0 ? 1 : (L + o) / L;
            document.getElementById('rx').innerText = Math.round(x * r);
            document.getElementById('rz').innerText = Math.round(z * r);
        } else {
            document.getElementById('rx').innerText = "-";
            document.getElementById('rz').innerText = "-";
        }
    }

    function updateUI() {
        const key = fields[currentIdx];
        curLabel.innerText = labels[currentIdx];
        curVal.innerText = data[key];
        
        if (key === "offset") { slider.min = 0; slider.max = 300; }
        else { slider.min = -500; slider.max = 500; }
        slider.value = data[key];
        run();
    }

    function changeMode(dir) {
        currentIdx = (currentIdx + dir + fields.length) % fields.length;
        updateUI();
    }

    function adjustVal(delta) {
        const key = fields[currentIdx];
        data[key] += delta;
        
        // 限制範圍
        if(key === "offset") data[key] = Math.max(0, Math.min(300, data[key]));
        else data[key] = Math.max(-500, Math.min(500, data[key]));
        
        updateUI();
    }

    slider.oninput = () => {
        data[fields[currentIdx]] = parseInt(slider.value);
        curVal.innerText = slider.value;
        run();
    };

    // 支援 Watch8 實體錶圈 (Bezel)
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        // 轉動幅度偵測
        const step = Math.abs(e.deltaY) > 50 ? 5 : 1;
        adjustVal(e.deltaY < 0 ? step : -step);
    }, { passive: false });

    updateUI();
</script>

</body>
</html>
