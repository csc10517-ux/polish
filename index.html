<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POLISH_WATCH_V13</title>
<style>
    /* 強制隱藏捲軸但允許捲動，用來捕捉實體錶圈訊號 */
    html, body { 
        background: #000; color: #fff; margin: 0; padding: 0; 
        width: 100%; height: 100%; overflow-y: scroll; 
        font-family: sans-serif; touch-action: none;
    }
    body::-webkit-scrollbar { display: none; }

    .container { 
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
        display: flex; flex-direction: column; align-items: center; 
        justify-content: center; box-sizing: border-box; overflow: hidden;
    }
    
    /* 結果區：再往內縮，確保不被裁切 */
    .res-area { position: absolute; top: 18%; width: 85%; display: flex; justify-content: space-around; text-align: center; }
    .res-item b { font-size: 38px; color: #ff4d4f; display: block; line-height: 1; }
    .res-item span { font-size: 11px; color: #888; }

    /* 中央數值區 */
    .center-content { text-align: center; width: 75%; z-index: 5; margin-top: 10px; }
    .mode-label { font-size: 14px; color: #ffa940; font-weight: bold; }
    .val-display { font-size: 58px; font-weight: bold; line-height: 1; margin: 5px 0; }
    
    .slider-container { width: 100%; margin-top: 5px; }
    #slider { width: 100%; height: 18px; appearance: none; background: #333; border-radius: 10px; outline: none; }
    #slider::-webkit-slider-thumb { appearance: none; width: 30px; height: 30px; background: #1890ff; border-radius: 50%; border: 2px solid #fff; }

    /* 四角按鈕：大幅度往中間移動 */
    .corner-btn { 
        position: absolute; width: 48px; height: 48px; background: #262626; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        font-size: 20px; border: 1px solid #444; z-index: 10; color: #fff; 
    }
    .corner-btn:active { background: #1890ff; }
    
    /* 根據 6674.jpg 修正的位置：遠離邊緣 */
    #btnPrevMode { top: 32%; left: 15%; }   /* 左上分頁 */
    #btnNextMode { top: 32%; right: 15%; }  /* 右上分頁 */
    #btnMinus    { bottom: 15%; left: 22%; } /* 左下微調 */
    #btnPlus     { bottom: 15%; right: 22%; }/* 右下微調 */

    /* 輔助捲動層：高度設為很大，讓錶圈轉動時能產生 scroll 事件 */
    .scroll-helper { height: 10000px; width: 1px; pointer-events: none; }
</style>
</head>
<body>

<div class="container">
    <div class="res-area">
        <div class="res-item"><span>X1</span><b id="rx">-</b></div>
        <div class="res-item"><span>Z1</span><b id="rz">-</b></div>
    </div>

    <div class="center-content">
        <div class="mode-label" id="curLabel">補正值 (Offset)</div>
        <div class="val-display" id="curVal">175</div>
        <div class="slider-container">
            <input type="range" id="slider" min="0" max="300" value="175">
        </div>
    </div>

    <div class="corner-btn" id="btnPrevMode" onclick="changeMode(-1)">◀</div>
    <div class="corner-btn" id="btnNextMode" onclick="changeMode(1)">▶</div>
    <div class="corner-btn" id="btnMinus" onclick="adjustVal(-1)">－</div>
    <div class="corner-btn" id="btnPlus" onclick="adjustVal(1)">＋</div>
</div>

<!-- 用來捕捉實體錶圈轉動的隱形層 -->
<div class="scroll-helper"></div>

<script>
    const slider = document.getElementById('slider');
    const curVal = document.getElementById('curVal');
    const curLabel = document.getElementById('curLabel');

    let data = { offset: 175, x: 0, z: 0 };
    const fields = ["offset", "x", "z"];
    const labels = ["補正值 (Offset)", "X 座標", "Z 座標"];
    let currentIdx = 0;

    function run() {
        const o = data.offset;
        const x = data.x;
        const z = data.z;
        if (x !== 0 || z !== 0) {
            const L = Math.sqrt(x * x + z * z);
            const r = L === 0 ? 1 : (L + o) / L;
            document.getElementById('rx').innerText = Math.round(x * r);
            document.getElementById('rz').innerText = Math.round(z * r);
        } else {
            document.getElementById('rx').innerText = "-";
            document.getElementById('rz').innerText = "-";
        }
    }

    function updateUI() {
        const key = fields[currentIdx];
        curLabel.innerText = labels[currentIdx];
        curVal.innerText = data[key];
        if (key === "offset") { slider.min = 0; slider.max = 300; }
        else { slider.min = -500; slider.max = 500; }
        slider.value = data[key];
        run();
    }

    function changeMode(dir) {
        currentIdx = (currentIdx + dir + fields.length) % fields.length;
        updateUI();
    }

    function adjustVal(delta) {
        const key = fields[currentIdx];
        data[key] += delta;
        if(key === "offset") data[key] = Math.max(0, Math.min(300, data[key]));
        else data[key] = Math.max(-500, Math.min(500, data[key]));
        updateUI();
    }

    slider.oninput = () => {
        data[fields[currentIdx]] = parseInt(slider.value);
        curVal.innerText = slider.value;
        run();
    };

    // 實體錶圈控制邏輯：監聽 scroll 事件
    let lastScrollTop = window.pageYOffset || document.documentElement.scrollTop;
    
    // 初始化捲動位置到中間，確保往上往下都有空間
    window.scrollTo(0, 5000);

    window.onscroll = function() {
        let st = window.pageYOffset || document.documentElement.scrollTop;
        let diff = st - lastScrollTop;
        
        if (Math.abs(diff) > 2) { // 稍微有動才算
            adjustVal(diff > 0 ? -1 : 1);
            lastScrollTop = st;
            
            // 轉到底自動重置位置，維持無限轉動效果
            if (st < 2000 || st > 8000) {
                window.scrollTo(0, 5000);
                lastScrollTop = 5000;
            }
        }
    };

    updateUI();
</script>

</body>
</html>
